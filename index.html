<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Dropdown</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      padding: 50px;
    }


    .dropdown {
      position: relative;
      width: 220px;
    }


    .dropdown-btn {
      width: 100%;
      padding: 10px;
      border-radius: 8px;
      border: 1px solid #ccc;
      background: white;
      cursor: pointer;
      text-align: left;
    }

    .dropdown-menu {
      position: absolute;
      top: 110%;
      width: 100%;
      background: rgb(221, 146, 146);
      border: 1px solid #ddd;
      border-radius: 8px;
      display: none;
      list-style: none;
      padding: 0;
      margin: 0;
      z-index: 1000; 
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
    }

  
    .dropdown-menu.show {
      display: block;
    }

    .dropdown-menu li {
      padding: 10px;
      cursor: pointer;
      user-select: none;
    }

    .dropdown-menu li:hover {
      background: #f0f0f0;
    }
     .checkbox {
      display: flex;
      align-items: center;
      gap: 10px;
      cursor: pointer;
      font-size: 16px;
    }

    /* Hide default checkbox */
    .checkbox input {
      display: none;
    }

    /* Custom box */
    .box {
      width: 20px;
      height: 20px;
      border: 2px solid #ccc;
      border-radius: 5px;
      position: relative;
      transition: 0.2s;
    }

    /* Checked state */
    .checkbox input:checked + .box {
      background-color: red;
      border-color: red;
    }

    /* Tick */
    .box::after {
      content: "";
      position: absolute;
      display: none;
    }

    /* Show tick */
    .checkbox input:checked + .box::after {
      display: block;
    }

    /* Tick style */
    .box::after {
      left: 6px;
      top: 2px;
      width: 5px;
      height: 10px;
      border: solid white;
      border-width: 0 2px 2px 0;
      transform: rotate(45deg);
    }

    /* Hover effect */
    .checkbox:hover .box {
      border-color: red;
    }
    

  </style>
</head>

<body>

  <main>
  <div class="dropdown">
    <button class="dropdown-btn">Sort</button>

    <h1>heloooo</h1>

    <ul class="dropdown-menu">
      <li>Show Latest First</li>
      <li>Show Oldest First</li>
      <li>Featured</li>
    </ul>
  </div>

 <form>
    <label class="checkbox">
    <input type="checkbox">
    <span class="box"></span>
    Accept Terms & Conditions
  </label>
</form>
  </main>
  <script>
    const btn = document.querySelector(".dropdown-btn");
    const menu = document.querySelector(".dropdown-menu");
    const items = document.querySelectorAll(".dropdown-menu li");


    btn.addEventListener("click", () => {
      menu.classList.toggle("show");
    });


    items.forEach(item => {
      item.addEventListener("click", () => {
        btn.textContent = item.textContent; 
        menu.classList.remove("show");
      });
    });

  
    document.addEventListener("click", (e) => {
      if (!e.target.closest(".dropdown")) {
        menu.classList.remove("show");
      }
    });
  </script>

</body>
</html>
